server:
  port: 8080

spring:
  application:
    name: meeting-ai
  datasource:
    url: jdbc:mysql://localhost:3306/meeting_ai?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

fastgpt:
  api-key: ${FASTGPT_API_KEY:}
  api-base: ${FASTGPT_API_BASE:https://fastgpt.run/api}
  model: gpt-3.5-turbo
  max-tokens: 4000
  timeout: 120000

logging:
  level:
    com.meeting.ai.mapper: debug
